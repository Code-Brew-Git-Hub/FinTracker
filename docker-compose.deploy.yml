# GitLab CI/CD: деплой из Container Registry (порт фронтенда — 8082).
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-FinTrackerDb}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-fintracker}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-FinTrackerDb}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ${REGISTRY_IMAGE}/api:${FINTRACKER_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-FinTrackerDb}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-fintracker}
      AllowedOrigins__0: ${FRONTEND_URL:-http://localhost:8082}
      AllowedOrigins__1: http://localhost:${FRONTEND_PORT:-8082}
      AllowedOrigins__2: http://127.0.0.1:${FRONTEND_PORT:-8082}
      AllowedOrigins__3: http://192.168.0.21:${FRONTEND_PORT:-8082}
      AllowedOrigins__4: http://localhost:${API_PORT:-5009}
    ports:
      - "${API_PORT:-5009}:8080"

  frontend:
    image: ${REGISTRY_IMAGE}/frontend:${FINTRACKER_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      API_URL: ${API_URL:-http://localhost:8082/api}
    ports:
      - "${FRONTEND_PORT:-8082}:80"

volumes:
  postgres_data:
