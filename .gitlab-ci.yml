# Автодеплой: push в main → runner на docker-host собирает и публикует FinTracker.
# На сервере ничего настраивать не нужно (runner уже должен быть на docker-host).
#
# Один раз в GitLab → Settings → CI/CD → Variables:
#   DB_PASSWORD        (masked) — пароль PostgreSQL
#   LETSENCRYPT_EMAIL            — email для Let's Encrypt
#   DOMAIN             (optional) — по умолчанию fintracker.trydov1k.online
#   PUBLIC_URL         (optional) — по умолчанию https://$DOMAIN
#
# Если у runner есть tag — раскомментируйте секцию tags ниже и укажите свой.

stages:
  - deploy

variables:
  COMPOSE_PROJECT_NAME: fintracker
  DOMAIN: "fintracker.trydov1k.online"
  PUBLIC_URL: "https://fintracker.trydov1k.online"

deploy:production:
  stage: deploy
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - chmod +x deploy/write-env-from-ci.sh
    - ./deploy/write-env-from-ci.sh
    - docker compose -f docker-compose.yml -f docker-compose.server.yml build
    - docker compose -f docker-compose.yml -f docker-compose.server.yml up -d --remove-orphans
    - docker compose -f docker-compose.yml -f docker-compose.server.yml ps
  environment:
    name: production
    url: $PUBLIC_URL
