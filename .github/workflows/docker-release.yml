name: Docker images & Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish (e.g. latest or v1.0.0)"
        required: true
        default: latest

permissions:
  contents: read

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="latest"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Publishing images with tag: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (API)
        id: meta_api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fintracker-api
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ steps.version.outputs.version != 'latest' && github.ref_type == 'tag' }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./FinTracker.Backend
          file: ./FinTracker.Backend/Dockerfile
          push: true
          tags: ${{ steps.meta_api.outputs.tags }}
          labels: ${{ steps.meta_api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Extract metadata (Frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/fintracker-frontend
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=latest,enable=${{ steps.version.outputs.version != 'latest' && github.ref_type == 'tag' }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./FinTracker.Frontend
          file: ./FinTracker.Frontend/Dockerfile
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    needs: build-and-push
    if: github.ref_type == 'tag'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Self-hosted (готовые Docker-образы)

            Скопируйте в корень проекта `.env` (из `docker/.env.example`) и укажите версию:

            ```env
            FINTRACKER_VERSION=${{ needs.build-and-push.outputs.version }}
            GHCR_OWNER=${{ github.repository_owner }}
            ```

            Запуск без сборки из исходников:

            ```bash
            docker compose -f docker/docker-compose.images.yml pull
            docker compose -f docker/docker-compose.images.yml up -d
            ```

            - Frontend: http://localhost:8080
            - API / Swagger: http://localhost:5009/swagger

            Образы: `ghcr.io/${{ github.repository_owner }}/fintracker-api:${{ needs.build-and-push.outputs.version }}` и `fintracker-frontend` с тем же тегом.

            Подробнее: [docs/docker.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/docs/docker.md#запуск-из-готовых-образов-ghcr)
