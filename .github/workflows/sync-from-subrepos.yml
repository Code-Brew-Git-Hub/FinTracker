name: Sync from Backend / Frontend repos

# Manual / scheduled fallback. Primary sync runs in subrepo workflows on push to main.

on:
  workflow_dispatch:
    inputs:
      target:
        description: What to sync
        type: choice
        options:
          - both
          - backend
          - frontend
        default: both
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: write

concurrency:
  group: sync-from-subrepos
  cancel-in-progress: true

env:
  BACKEND_REPOSITORY: Code-Brew-Git-Hub/FinTracker.Backend
  FRONTEND_REPOSITORY: Code-Brew-Git-Hub/FinTracker.Frontend
  MONOREPO_BRANCH: "Lenyas's-final-version"

jobs:
  sync-backend:
    name: Sync Backend
    runs-on: ubuntu-24.04
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'both' || github.event.inputs.target == 'backend')

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MONOREPO_SYNC_TOKEN }}
          ref: ${{ env.MONOREPO_BRANCH }}

      - name: Checkout backend repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.BACKEND_REPOSITORY }}
          token: ${{ secrets.MONOREPO_SYNC_TOKEN }}
          path: subrepo/backend

      - name: Copy backend into monorepo
        run: |
          rsync -av --delete \
            --exclude '.git/' \
            --exclude '.github/workflows/sync-to-monorepo.yml' \
            --exclude '**/bin/' \
            --exclude '**/obj/' \
            --exclude '.vs/' \
            --exclude '.idea/' \
            --exclude '.env' \
            subrepo/backend/ FinTracker.Backend/

      - name: Commit and push backend sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add FinTracker.Backend
          if git diff --staged --quiet; then
            echo "Backend is already up to date."
            exit 0
          fi
          git commit -m "chore: sync FinTracker.Backend from ${{ env.BACKEND_REPOSITORY }}"
          git push

  sync-frontend:
    name: Sync Frontend
    runs-on: ubuntu-24.04
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' && (github.event.inputs.target == 'both' || github.event.inputs.target == 'frontend')

    steps:
      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MONOREPO_SYNC_TOKEN }}
          ref: ${{ env.MONOREPO_BRANCH }}

      - name: Checkout frontend repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.FRONTEND_REPOSITORY }}
          token: ${{ secrets.MONOREPO_SYNC_TOKEN }}
          path: subrepo/frontend

      - name: Copy frontend into monorepo
        run: |
          rsync -av --delete \
            --exclude '.git/' \
            --exclude '.github/workflows/sync-to-monorepo.yml' \
            --exclude 'node_modules/' \
            --exclude 'dist/' \
            --exclude 'dist-ssr/' \
            --exclude '.env' \
            subrepo/frontend/ FinTracker.Frontend/

      - name: Commit and push frontend sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add FinTracker.Frontend
          if git diff --staged --quiet; then
            echo "Frontend is already up to date."
            exit 0
          fi
          git commit -m "chore: sync FinTracker.Frontend from ${{ env.FRONTEND_REPOSITORY }}"
          git push
