# Runner "docker-host" должен монтировать сокет хоста:
#   volumes = ["/var/run/docker.sock:/var/run/docker.sock", "/cache"]
# На хосте Docker daemon — insecure-registries для HTTP registry:
#   { "insecure-registries": ["192.168.0.21:5050"] }

stages:
  - build
  - deploy

variables:
  DOCKER_HOST: unix:///var/run/docker.sock
  DOCKER_TLS_CERTDIR: ""
  FRONTEND_PORT: "8081"
  API_PORT: "5009"
  IMAGE_TAG: latest

.docker-job:
  image: docker:27
  before_script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"

build-api:
  extends: .docker-job
  stage: build
  script:
    - |
      docker build \
        -t "$CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHA" \
        -t "$CI_REGISTRY_IMAGE/api:$IMAGE_TAG" \
        -f FinTracker.Backend/Dockerfile \
        FinTracker.Backend
    - docker push "$CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/api:$IMAGE_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

build-frontend:
  extends: .docker-job
  stage: build
  script:
    - |
      docker build \
        -t "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA" \
        -t "$CI_REGISTRY_IMAGE/frontend:$IMAGE_TAG" \
        -f FinTracker.Frontend/Dockerfile \
        FinTracker.Frontend
    - docker push "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/frontend:$IMAGE_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy:
  extends: .docker-job
  stage: deploy
  needs:
    - build-api
    - build-frontend
  script:
    - export REGISTRY_IMAGE="$CI_REGISTRY_IMAGE"
    - export FINTRACKER_VERSION="$IMAGE_TAG"
    - docker compose -f docker-compose.deploy.yml pull
    - docker compose -f docker-compose.deploy.yml up -d --remove-orphans
  environment:
    name: fintracker
    url: http://192.168.0.21:8081
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
