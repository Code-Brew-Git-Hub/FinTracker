# Автодеплой: push в main → runner на docker-host собирает и публикует FinTracker.
# Runner: docker executor, образ docker:24 (Alpine — без bash, только sh).
#
# Один раз в GitLab → Settings → CI/CD → Variables:
#   DB_PASSWORD        (masked) — пароль PostgreSQL
#   LETSENCRYPT_EMAIL            — email для Let's Encrypt
#   DOMAIN             (optional) — по умолчанию fintracker.trydov1k.online
#   PUBLIC_URL         (optional) — по умолчанию https://$DOMAIN

image: docker:24

stages:
  - deploy

variables:
  COMPOSE_PROJECT_NAME: fintracker
  DOMAIN: "fintracker.trydov1k.online"
  PUBLIC_URL: "https://fintracker.trydov1k.online"
  DOCKER_TLS_CERTDIR: ""

deploy:production:
  stage: deploy
  tags:
    - docker
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  script:
    - docker info
    - df -h
    - docker system df
    - docker container prune -f || true
    - docker image prune -af || true
    - docker builder prune -af || true
    - df -h
    - sh deploy/write-env-from-ci.sh
    - docker compose -f docker-compose.yml -f docker-compose.server.yml build
    - |
      if ! docker compose -f docker-compose.yml -f docker-compose.server.yml up -d --remove-orphans --wait --wait-timeout 180; then
        echo ">> postgres logs:"
        docker compose -f docker-compose.yml -f docker-compose.server.yml logs postgres --no-log-prefix --tail 80 || true
        docker compose -f docker-compose.yml -f docker-compose.server.yml ps -a || true
        exit 1
      fi
    - docker compose -f docker-compose.yml -f docker-compose.server.yml ps
  environment:
    name: production
    url: $PUBLIC_URL
