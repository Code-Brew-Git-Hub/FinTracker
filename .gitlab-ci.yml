stages:
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  FRONTEND_PORT: "8081"
  API_PORT: "5009"
  IMAGE_TAG: latest

.docker-job:
  image: docker:27
  services:
    - name: docker:27-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"

build-api:
  extends: .docker-job
  stage: build
  script:
    - |
      docker build \
        -t "$CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHA" \
        -t "$CI_REGISTRY_IMAGE/api:$IMAGE_TAG" \
        -f FinTracker.Backend/Dockerfile \
        FinTracker.Backend
    - docker push "$CI_REGISTRY_IMAGE/api:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/api:$IMAGE_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

build-frontend:
  extends: .docker-job
  stage: build
  script:
    - |
      docker build \
        -t "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA" \
        -t "$CI_REGISTRY_IMAGE/frontend:$IMAGE_TAG" \
        -f FinTracker.Frontend/Dockerfile \
        FinTracker.Frontend
    - docker push "$CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE/frontend:$IMAGE_TAG"
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

deploy:
  extends: .docker-job
  stage: deploy
  needs:
    - build-api
    - build-frontend
  script:
    - export REGISTRY_IMAGE="$CI_REGISTRY_IMAGE"
    - export FINTRACKER_VERSION="$IMAGE_TAG"
    - docker compose -f docker-compose.deploy.yml pull
    - docker compose -f docker-compose.deploy.yml up -d --remove-orphans
  environment:
    name: production
    url: http://localhost:8081
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
